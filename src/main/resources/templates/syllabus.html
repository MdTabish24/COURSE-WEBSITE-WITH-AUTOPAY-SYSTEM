<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course} + ' - Syllabus'">Course Syllabus</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8FBF8;
      --card: #F8FBF8;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #1B1B1C;
      --border: rgba(26, 26, 26, 0.12);
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #F8FBF8 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      width: min(980px, 92%);
      margin: 30px auto;
    }

    .head {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .tag {
      display: inline-flex;
      background: rgba(27, 27, 28, 0.16);
      color: #1B1B1C;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 30px;
      line-height: 1.2;
      font-family: "Poppins", sans-serif;
    }

    .meta {
      color: var(--muted);
      margin: 0;
    }

    .content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      line-height: 1.65;
      color: #343434;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: #F8FBF8;
    }

    .btn:hover {
      background: rgba(27, 27, 28, 0.08);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="head">
      <span class="tag" th:text="${sector}">Course Syllabus</span>
      <h1 th:text="${course}">Course Name</h1>
      <p class="meta">Detailed syllabus from your sector TXT files.</p>
    </section>
    <section class="content">
      <pre th:text="${syllabusText}"></pre>
    </section>
    <div class="actions">
      <a href="/#courses" class="btn">Back to Courses</a>
    </div>
  </main>
</body>
</html>
