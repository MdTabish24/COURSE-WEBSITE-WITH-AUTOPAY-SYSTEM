<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Submitted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8FBF8;
      --card: #F8FBF8;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #1B1B1C;
      --border: rgba(26, 26, 26, 0.12);
      --shadow: 0 12px 30px rgba(12, 32, 60, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Poppins", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .success-box {
      background: var(--card);
      padding: 40px 34px;
      text-align: center;
      border: 1px solid var(--border);
      max-width: 520px;
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    h1 {
      color: #1B1B1C;
      font-size: 36px;
      margin-bottom: 12px;
    }
    .checkmark {
      font-size: 64px;
      color: var(--accent);
      margin-bottom: 6px;
    }
    p {
      font-size: 15px;
      margin: 10px 0;
      color: var(--muted);
    }
    .highlight {
      color: #1B1B1C;
      font-weight: 600;
    }
    .back {
      display: inline-flex;
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      background: #F8FBF8;
    }
    .back:hover {
      background: rgba(27, 27, 28, 0.08);
    }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="checkmark">OK</div>
    <h1>Login Submitted</h1>
    <p th:text="'Your ' + ${roleLabel} + ' request has been saved.'">
      Your login request has been saved.
    </p>
    <p>
      We received details for
      <span class="highlight" th:text="${identifier}">your account</span>.
    </p>
    <p>Our team will verify and activate access if required.</p>
    <a class="back" href="/#courses">Back to Courses</a>
  </div>
</body>
</html>
